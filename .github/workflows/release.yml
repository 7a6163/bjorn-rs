name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            artifact: bjorn-aarch64
          - target: arm-unknown-linux-gnueabihf
            artifact: bjorn-armv6
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/bjorn ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            # First release — all commits
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          fi

          # Write changelog body
          {
            echo "body<<CHANGELOG_EOF"
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG:-initial}...${GITHUB_REF_NAME}"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Get binary sizes
        id: sizes
        run: |
          AARCH64_SIZE=$(du -h bjorn-aarch64/bjorn-aarch64 | cut -f1)
          ARMV6_SIZE=$(du -h bjorn-armv6/bjorn-armv6 | cut -f1)
          echo "aarch64=${AARCH64_SIZE}" >> "$GITHUB_OUTPUT"
          echo "armv6=${ARMV6_SIZE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ${{ steps.changelog.outputs.body }}

            ## Binary Sizes
            | Target | Size |
            |--------|------|
            | AArch64 (Pi Zero W2 / Pi 3/4/5) | ${{ steps.sizes.outputs.aarch64 }} |
            | ARMv6 (Pi Zero W) | ${{ steps.sizes.outputs.armv6 }} |
          files: |
            bjorn-aarch64/bjorn-aarch64
            bjorn-armv6/bjorn-armv6
