name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            arch: aarch64
          - target: arm-unknown-linux-gnueabihf
            arch: armv6
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary with version
        run: |
          VERSION=${GITHUB_REF_NAME}
          cp target/${{ matrix.target }}/release/bjorn bjorn-${{ matrix.arch }}-${VERSION}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bjorn-${{ matrix.arch }}
          path: bjorn-${{ matrix.arch }}-*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v8

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            # First release — all commits
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          fi

          # Write changelog body
          {
            echo "body<<CHANGELOG_EOF"
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG:-initial}...${GITHUB_REF_NAME}"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Get binary sizes
        id: sizes
        run: |
          VERSION=${GITHUB_REF_NAME}
          AARCH64_SIZE=$(du -h bjorn-aarch64/bjorn-aarch64-${VERSION} | cut -f1)
          ARMV6_SIZE=$(du -h bjorn-armv6/bjorn-armv6-${VERSION} | cut -f1)
          echo "aarch64=${AARCH64_SIZE}" >> "$GITHUB_OUTPUT"
          echo "armv6=${ARMV6_SIZE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ${{ steps.changelog.outputs.body }}

            ## Binary Sizes
            | Target | Size |
            |--------|------|
            | AArch64 (Pi Zero W2 / Pi 3/4/5) | ${{ steps.sizes.outputs.aarch64 }} |
            | ARMv6 (Pi Zero W) | ${{ steps.sizes.outputs.armv6 }} |

            ## Install
            ```bash
            # Pi Zero W2 / Pi 3/4/5
            wget <release-url>/bjorn-aarch64-${{ github.ref_name }}
            chmod +x bjorn-aarch64-${{ github.ref_name }}

            # Pi Zero W
            wget <release-url>/bjorn-armv6-${{ github.ref_name }}
            chmod +x bjorn-armv6-${{ github.ref_name }}
            ```
          files: |
            bjorn-aarch64/bjorn-aarch64-*
            bjorn-armv6/bjorn-armv6-*
